version: "3.9"

services:
  webapi:
    build:
      context: .
      dockerfile: CodeLeap.API/Dockerfile
    ports:
      - "5000:80"
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=db;Database=CodeLeapDb;User=sa;Password=Your_password123;TrustServerCertificate=True
      - Jwt__Key=SuperSecretKeyForDocker12345
      - Jwt__Issuer=CodeLeap
      - Jwt__Audience=CodeLeapUsers

  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
